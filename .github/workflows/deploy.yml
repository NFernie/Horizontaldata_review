name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      pipeline: ${{ steps.pipeline.outputs.run }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect pipeline-affecting changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            pipeline:
              - 'scripts/**'
              - 'requirements.txt'
              - 'Oil_Water_Contact.csv'
              - 'DC30.xlsx'
              - 'Mck_Murta.xlsx'
              - 'Isolation_Depths.xlsx'
              - 'New Statistical Methods.md'
              - 'pay-rules.md'
              - '**/*.pdf'
              - '**/*_trajectory'
              - 'Jena_*'
              - 'Biala_*'
              - 'Frosti_*'
              - 'Granchio_*'
              - 'Hobbes_*'
              - 'Stimpee_*'
              - 'Teringie_*'
              - 'Mck_*'
              - 'McKinlay*'
              - 'McKINLAY*'
              - 'JENA*'
              - 'BIALA*'

      - name: Set pipeline flag
        id: pipeline
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.filter.outputs.pipeline }}" = "true" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python
        if: needs.changes.outputs.pipeline == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        if: needs.changes.outputs.pipeline == 'true'
        run: pip install -r requirements.txt

      - name: Generate well data
        if: needs.changes.outputs.pipeline == 'true'
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          python3 scripts/export_web_data.py
          python3 scripts/build_corpus_index.py
          python3 scripts/test_zoi.py
          python3 scripts/test_owc.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install and build site
        working-directory: site
        run: |
          npm ci
          npm test
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
