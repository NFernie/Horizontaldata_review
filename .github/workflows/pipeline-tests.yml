name: Pipeline Tests

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'requirements.txt'
      - 'Oil_Water_Contact.csv'
      - 'DC30.xlsx'
      - 'Mck_Murta.xlsx'
      - 'pay-rules.md'
  pull_request:
    paths:
      - 'scripts/**'
      - 'requirements.txt'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline unit tests
        run: |
          python3 scripts/test_grain_ordinal.py
          python3 scripts/test_zoi.py
          python3 scripts/test_owc.py
          python3 scripts/test_pay_overburden.py
